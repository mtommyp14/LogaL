name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Download dependencies
      run: go mod tidy

    - name: Build main binary
      run: go build -v ./...

    - name: Build migration helper
      run: go build -v ./cmd/migrate

    - name: Test
      run: go test -v ./...
