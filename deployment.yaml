# LogaL — All-in-one Kubernetes manifest
# Includes: Namespace, RBAC, Deployment, Service
#
# What it does:
#   - Deploys 2 replicas of LogaL in the `logging` namespace.
#   - One pod becomes the leader via PostgreSQL lease and auto-collects logs
#     from every pod/container in every namespace.
#   - The second pod stays on standby and takes over if the leader fails.
#   - Exposes the UI/API on port 8080 through a ClusterIP Service.
#
# Requirements:
#   - PostgreSQL database reachable from the cluster.
#   - Create the logal-db secret before applying this manifest.
#
# Quick deploy (single cluster):
#   kubectl create secret generic logal-db \
#     --from-literal=url="postgres://user:pass@host:5432/logal" -n logging
#   kubectl apply -f deployment.yaml
#
# Multi-cluster (optional):
#   kubectl create secret generic logal-kubeconfig \
#     --from-file=config=./merged-kubeconfig -n logging
#   # then uncomment the KUBECONFIG env and kubeconfig volume in the Deployment
#   kubectl apply -f deployment.yaml

---
apiVersion: v1
kind: Namespace
metadata:
  name: logging

---
# ── ServiceAccount ────────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: logal
  namespace: logging

---
# ── ClusterRole (read-only: pods, logs, namespaces, workloads) ─────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: logal-role
rules:
- apiGroups: [""]
  resources: ["namespaces", "pods", "pods/log"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets", "daemonsets", "replicasets"]
  verbs: ["get", "list"]

---
# ── ClusterRoleBinding ────────────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: logal-rolebinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: logal-role
subjects:
- kind: ServiceAccount
  name: logal
  namespace: logging

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logal
  namespace: logging
  labels:
    app: logal
spec:
  # Run 2 replicas for high availability. Only the leader collects logs;
  # the standby replica takes over automatically during rolling updates.
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: logal
  template:
    metadata:
      labels:
        app: logal
    spec:
      serviceAccountName: logal

      containers:
      - name: logal
        image: mtommyp14/logal:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http

        env:
        # Web server port
        - name: PORT
          value: "8080"
        # Unique pod name used by leader election (downward API)
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        # PostgreSQL connection string (required)
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: logal-db
              key: url
        # Number of days to keep log history in PostgreSQL.
        # The UI time-range dropdown is generated from this value.
        - name: LOG_RETENTION_DAYS
          value: "7"
        # Optional: restrict log collection to specific namespaces.
        # Empty means collect logs from all namespaces.
        # - name: ALLOWED_NAMESPACES
        #   value: "staging,production"
        # Optional: multi-cluster support (requires kubeconfig volume below)
        # - name: KUBECONFIG
        #   value: "/kubeconfig/config"

        volumeMounts:
        # Optional: mount merged kubeconfig for multi-cluster mode
        # - name: kubeconfig
        #   mountPath: /kubeconfig
        #   readOnly: true

        # Resource limits are intentionally generous because the leader pod
        # runs many concurrent kubectl log streams in large clusters.
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi

        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30

      volumes:
      # Optional: merged kubeconfig for multi-cluster mode
      # - name: kubeconfig
      #   secret:
      #     secretName: logal-kubeconfig

---
# ── Service ───────────────────────────────────────────────────────────────────
# Exposes the LogaL UI/API on port 80 inside the cluster.
# Use port-forward, an Ingress, or a LoadBalancer to access from outside.
apiVersion: v1
kind: Service
metadata:
  name: logal
  namespace: logging
spec:
  selector:
    app: logal
  ports:
  - port: 80
    targetPort: 8080
    name: http
  type: ClusterIP

---
